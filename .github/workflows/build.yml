name: Build APKs

# Builds installable debug APKs for both Android modules and uploads them as
# downloadable artifacts. Trigger manually from the Actions tab (Run workflow),
# or it runs automatically on every push to main.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [ spotlight-wallpaper, dashboard ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: ${{ matrix.module }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.module }}-debug
          path: ${{ matrix.module }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
